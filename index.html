<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthLens | Fake News Detector</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    

    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --real-color: #34d399;
            --fake-color: #f87171;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #020617 100%);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--container-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 650px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            resize: none;
            margin-bottom: 24px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        textarea::placeholder {
            color: #64748b;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-hover));
            flex: 1;
            min-width: 200px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-green-hover));
            flex: 1;
            min-width: 200px;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
        }

        .result-box {
            margin-top: 24px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            font-size: 18px;
            font-weight: 600;
            display: none;
            animation: pulse 2s infinite;
        }

        .result-box.done {
            animation: none;
            background: rgba(15, 23, 42, 0.8);
        }

        .status-real { color: var(--real-color); }
        .status-fake { color: var(--fake-color); }

        /* Animation for loading state */
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .loading-text {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 16px;
        }

        /* Live News Section */
        #liveNewsSection {
            margin-top: 40px;
            text-align: left;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        .section-header h3 {
            margin: 0;
            color: #e2e8f0;
            font-size: 1.25rem;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background-color: var(--fake-color);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; box-shadow: 0 0 8px var(--fake-color); }
            50% { opacity: 0.3; box-shadow: none; }
            100% { opacity: 1; box-shadow: 0 0 8px var(--fake-color); }
        }

        #liveNewsList {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .news-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            transition: transform 0.2s, background 0.2s;
        }

        .news-item:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .news-title {
            color: #f1f5f9;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            line-height: 1.5;
            display: block;
            margin-bottom: 10px;
        }

        .news-title:hover {
            color: var(--accent-blue);
        }

        .news-meta {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* New CSS for User Profile and Login Container */
        .user-profile {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .user-profile img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--accent-blue);
        }

        .user-profile span {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
        }

        #loginContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        .login-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .login-input::placeholder {
            color: #64748b;
        }

        .login-form {
            width: 100%;
            max-width: 300px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
        }

        #mainAppContainer {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>

<body>

    <!-- Login Container -->
    <div class="container" id="loginContainer">
        <h1>Welcome to TruthLens</h1>
        <p class="subtitle">Sign in to access the Neural Network powered Fake News Detector</p>
        
        <div class="login-form">
            <input type="text" id="usernameInput" class="login-input" placeholder="Username" autocomplete="username">
            <input type="password" id="passwordInput" class="login-input" placeholder="Password" autocomplete="current-password">
            <button class="btn-primary" style="width: 100%; margin-top: 10px;" onclick="handleStandardLogin()">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                Sign In
            </button>
            <p id="loginError" style="color: var(--fake-color); font-size: 14px; margin-top: 16px; display: none;">Please enter both username and password.</p>
        </div>
    </div>

    <!-- Main App Container (Hidden initially) -->
    <div class="container" id="mainAppContainer" style="display: none;">
        <div class="user-profile" id="userProfile" style="display: none;">
            <img id="userAvatar" src="https://api.dicebear.com/7.x/initials/svg?seed=User" alt="User Avatar">
            <span id="userName">User Name</span>
        </div>

        <h1>TruthLens</h1>
        <p class="subtitle">Powered by Neural Networks & Real-Time Internet Scanning</p>
        
        <textarea id="newsInput" placeholder="Paste a suspicious news headline or text here to verify its authenticity..."></textarea>
        
        <div class="button-group">
            <button class="btn-primary" onclick="checkNews()">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                Verify News
            </button>
            <button class="btn-secondary" onclick="fetchLiveNews()">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Live API Scanner
            </button>
        </div>

        <div id="result" class="result-box"></div>

        <div id="liveNewsSection">
            <div class="section-header">
                <div class="live-dot"></div>
                <h3>Active Internet Radar</h3>
            </div>
            <ul id="liveNewsList"></ul>
        </div>
    </div>

    <script>
        function handleStandardLogin() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('loginError');

            if (!username || !password) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Please enter both username and password.';
                return;
            }

            // In a real app, you would send credentials to the backend here.
            // For now, we simulate a successful login for any non-empty input.

            errorMsg.style.display = 'none';
            
            // Hide the login screen and show the main app
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('mainAppContainer').style.display = 'block';
            
            // Show user profile with details
            document.getElementById('userProfile').style.display = 'flex';
            document.getElementById('userName').textContent = username;
            // Generate a dynamic avatar based on the username
            document.getElementById('userAvatar').src = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(username)}&backgroundColor=3b82f6`;
        }

        // Allow pressing Enter to login
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && document.getElementById('loginContainer').style.display !== 'none') {
                handleStandardLogin();
            }
        });

        async function fetchLiveNews() {
            const listDiv = document.getElementById('liveNewsList');
            const sectionDiv = document.getElementById('liveNewsSection');
            
            sectionDiv.style.display = "block";
            listDiv.innerHTML = "<li class='news-item'><span class='loading-text'>Connecting to global news satellites...</span></li>";

            try {
                const response = await fetch('http://127.0.0.1:5000/live-news');
                const data = await response.json();
                
                listDiv.innerHTML = "";
                if (data.error) {
                    listDiv.innerHTML = `<li class='news-item'><span class='status-fake'>Error: ${data.error}</span></li>`;
                    return;
                }

                data.forEach(item => {
                    const li = document.createElement('li');
                    li.className = "news-item";
                    
                    const isReal = item.prediction.includes('REAL');
                    const statusClass = isReal ? 'status-real' : 'status-fake';
                    const icon = isReal ? '✓' : '✗';
                    
                    li.innerHTML = `
                        <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
                        <div class="news-meta">AI Scan: <span class="${statusClass}" style="font-weight: 600; margin-left:4px;">${icon} ${item.prediction}</span></div>
                    `;
                    listDiv.appendChild(li);
                });
            } catch (error) {
                listDiv.innerHTML = "<li class='news-item'><span class='status-fake'>Error connecting to backend systems.</span></li>";
            }
        }

        async function checkNews() {
            const text = document.getElementById('newsInput').value;
            const resultDiv = document.getElementById('result');

            if (!text) {
                alert("Please paste some text to analyze.");
                return;
            }

            resultDiv.style.display = "block";
            resultDiv.className = "result-box"; // reset done class
            resultDiv.innerHTML = "<span class='loading-text'>Running NLP models & cross-referencing with Live API...</span>";

            try {
                const response = await fetch('http://127.0.0.1:5000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();
                const prediction = data.result; 
                const sources = data.sources || [];

                resultDiv.className = "result-box done";
                const isReal = prediction.includes('REAL');
                const statusClass = isReal ? 'status-real' : 'status-fake';
                const icon = isReal ? 'Shield Verified' : 'Alert';

                let htmlContent = `<span class="${statusClass}">[${icon}] ${prediction}</span>`;
                
                if (sources.length > 0) {
                    htmlContent += `<div style="margin-top: 15px; text-align: left; font-size: 14px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px;">
                        <div style="color: #94a3b8; margin-bottom: 8px; font-weight: 600;">Sources Verified:</div>
                        <ul style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px;">`;
                    sources.forEach(source => {
                        const sourceName = source.source_id ? source.source_id : 'Internet Source';
                        htmlContent += `<li><a href="${source.link}" target="_blank" style="color: #60a5fa; text-decoration: none; display: flex; align-items: flex-start; gap: 6px;">
                            <svg style="min-width:14px; margin-top:2px;" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            <span>${source.title}</span> 
                            <span style="color: #64748b; font-size: 11px; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 12px; white-space: nowrap;">${sourceName}</span>
                        </a></li>`;
                    });
                    htmlContent += `</ul></div>`;
                }

                resultDiv.innerHTML = htmlContent;
            } catch (error) {
                resultDiv.className = "result-box done";
                resultDiv.innerHTML = "<span class='status-fake'>Error: Backend connection refused. Is app.py running?</span>";
            }
        }
    </script>

</body>
</html>
